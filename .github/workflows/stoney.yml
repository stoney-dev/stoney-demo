name: Stoney Demo

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  stoney:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Stoney (repo contracts)
        uses: stoney-dev/stoney@release
        with:
          api_url: "https://stoneydev.com"
          stoney_token: ${{ secrets.STONEY_TOKEN }}
          suite: "contracts/*.yml"
          retries: "2"
          timeout_ms: "15000"
          fail_fast: "true"
          require_work_item: "true"
          work_item_pattern: "^KAN-\\d+$"
          report: "stoney-report.json"
          artifact_name: "stoney-report"
